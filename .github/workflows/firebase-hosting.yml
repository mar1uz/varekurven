# Workflow pentru deploy automat din GitHub pe Firebase Hosting și Cloud Run

name: Deploy to Firebase Hosting & Cloud Run on Push

on:
  push:
    branches:
      - main  # sau master, în funcție de numele ramurii tale principale

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      # Pasul 1: Deploy pe Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: gen-lang-client-0610749770
          channelId: live
